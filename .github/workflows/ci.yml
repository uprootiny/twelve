name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install caddy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debian-keyring debian-archive-keyring apt-transport-https curl
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
            | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' \
            | sudo tee /etc/apt/sources.list.d/caddy-stable.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq caddy

      - name: Run pre-commit suite across full tree
        run: |
          set -euo pipefail
          export STAGED="$(git ls-files)"
          fail=0
          for hook in .githooks/pre-commit.d/*.sh; do
            [ -x "$hook" ] || chmod +x "$hook"
            name="${hook##*/}"
            if out="$("$hook" 2>&1)"; then
              echo "  ok   $name"
            else
              echo "  FAIL $name"
              echo "$out" | sed 's/^/       /'
              fail=1
            fi
          done
          exit "$fail"

      - name: caddy adapt every snippet
        run: |
          for f in deploy/*/Caddyfile.snippet; do
            echo "adapting $f"
            caddy adapt --config "$f" --adapter caddyfile >/dev/null
          done
